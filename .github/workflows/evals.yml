name: evals (L1 deterministic)

# Runs the L1 contract checks on every PR and push to main. L1 is deterministic,
# needs no API key, and costs nothing. L2 (behavioral, LLM-in-the-loop) is run
# locally / on demand — see scripts/eval/README.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  l1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No install step — the harness is zero-dependency (node builtins + bash).
      - name: L1 contract checks
        run: node scripts/eval/l1.mjs
